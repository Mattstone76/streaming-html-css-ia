
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Netflix</h1>
        <button id="theme-toggle" aria-label="Alternar entre modo escuro e claro">🌙</button>
    </header>

    <main>
        <section aria-labelledby="profiles-title">
            <h2 id="profiles-title">Quem está assistindo?</h2>

            <ul class="profiles">
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-1.jpg?v=2" alt="Personagem em estilo stop-motion de Tim Burton usando monóculo e roupas remendadas em um cenário gótico com escadas e velas.">
                            <figcaption>Seu Perfil</figcaption>
                        </figure>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-2.jpg?v=2" alt="Boné cinza com aba azul e letra M bordada, decorado com remendos coloridos e botões amarelos, em um cenário gótico azulado.">
                            <figcaption>Família</figcaption>
                        </figure>
                    </article>
                </li>

                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-3.png?v=2" alt="Ilustração em estilo cartoon de uma raposa fofa acenando, com gravata borboleta, em uma moldura de perfil com ícones de entretenimento (pipoca, corações, play).">
                            <figcaption>Kids</figcaption>
                        </figure>
                    </article>
                </li>

                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/Perfil-4.png?v=2" alt="Personagem em estilo stop-motion de Tim Burton usando monóculo e roupas remendadas em um cenário gótico com escadas e velas.">
                            <figcaption>Amigo</figcaption>
                        </figure>
                    </article>
                </li>
            </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
